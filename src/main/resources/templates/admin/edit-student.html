<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Bright Future School</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f1f5f9;
        }

        .edit-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .form-section-title {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 2rem 0 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 3px solid #2563eb;
        }

        .form-label {
            font-weight: 500;
            color: #374151;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            padding: 0.7rem 1rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.1);
        }

        .photo-upload {
            text-align: center;
            padding: 2rem;
            border: 2px dashed #e5e7eb;
            border-radius: 15px;
            background: #f9fafb;
            cursor: pointer;
        }

        .photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #2563eb;
        }

        .btn-update {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            color: white;
            padding: 0.8rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            border: none;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .required::after {
            content: " *";
            color: #dc2626;
        }
    </style>
</head>
<body>
<div class="edit-container">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/admin/students">Students</a></li>
            <li class="breadcrumb-item active">Edit Student</li>
        </ol>
    </nav>

    <div class="form-card">
        <h4 class="mb-4">
            <i class="bi bi-pencil-square text-primary"></i>
            Edit Student: <span th:text="${student.fullName}">Student Name</span>
        </h4>

        <form th:action="@{/admin/students/update/{id}(id=${student.id})}"
              th:object="${student}"
              method="post"
              enctype="multipart/form-data">

            <!-- Current Photo -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">Current Photo</label>
                    <div class="photo-upload" onclick="document.getElementById('photoFile').click()">
                        <img id="photoPreview"
                             class="photo-preview"
                             th:src="${student.photo} ? @{'/uploads/' + ${student.photo}} : @{/images/default-avatar.png}"
                             alt="Photo">
                        <p class="text-muted mt-2 mb-0">Click to change photo</p>
                    </div>
                    <input type="file"
                           id="photoFile"
                           name="photoFile"
                           accept="image/*"
                           style="display: none;"
                           onchange="previewPhoto(event)">
                </div>
            </div>

            <!-- Personal Information -->
            <h5 class="form-section-title">Personal Information</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Surname</label>
                    <input type="text" class="form-control" th:field="*{surname}">
                    <div th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">First Name</label>
                    <input type="text" class="form-control" th:field="*{firstName}">
                    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Middle Name</label>
                    <input type="text" class="form-control" th:field="*{middleName}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Gender</label>
                    <select class="form-select" th:field="*{gender}">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Date of Birth</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Class</label>
                    <select class="form-select" th:field="*{className}">
                        <option value="">Select Class</option>
                        <option value="Nursery 1">Nursery 1</option>
                        <option value="Nursery 2">Nursery 2</option>
                        <option value="Primary 1">Primary 1</option>
                        <option value="Primary 2">Primary 2</option>
                        <option value="Primary 3">Primary 3</option>
                        <option value="Primary 4">Primary 4</option>
                        <option value="Primary 5">Primary 5</option>
                        <option value="Primary 6">Primary 6</option>
                    </select>
                </div>
            </div>

            <!-- Parent Information -->
            <h5 class="form-section-title">Parent/Guardian Information</h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Parent Name</label>
                    <input type="text" class="form-control" th:field="*{parentName}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Parent Phone</label>
                    <input type="tel" class="form-control" th:field="*{parentPhone}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Parent Email</label>
                    <input type="email" class="form-control" th:field="*{parentEmail}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Address</label>
                    <input type="text" class="form-control" th:field="*{address}">
                </div>
            </div>

            <!-- Additional Information -->
            <h5 class="form-section-title">Additional Information</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-select" th:field="*{bloodGroup}">
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Medical Condition</label>
                    <input type="text" class="form-control" th:field="*{medicalCondition}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Emergency Contact</label>
                    <input type="tel" class="form-control" th:field="*{emergencyContact}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Graduated">Graduated</option>
                        <option value="Transferred">Transferred</option>
                    </select>
                </div>
            </div>

            <!-- Form Buttons -->
            <div class="d-flex gap-3 mt-4 pt-4 border-top">
                <button type="submit" class="btn btn-update">
                    <i class="bi bi-check-lg"></i> Update Student
                </button>
                <a href="/admin/students" class="btn btn-secondary rounded-pill px-4">
                    <i class="bi bi-x-lg"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function previewPhoto(event) {
        const file = event.target.files[0];
        const preview = document.getElementById('photoPreview');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }
</script>
</body>
</html>
