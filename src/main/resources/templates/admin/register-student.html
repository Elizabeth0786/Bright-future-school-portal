<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Register Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #E65100;
            --primary-dark: #BF360C;
            --primary-light: #FFF3E0;
            --warning: #F57C00;
            --success: #2E7D32;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
        }

        .registration-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .form-section-title {
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1.2rem;
            margin: 2rem 0 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 3px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section-title i {
            color: var(--warning);
        }

        .form-label {
            font-weight: 500;
            color: #424242;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0.7rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(230, 81, 0, 0.1);
        }

        .photo-upload {
            text-align: center;
            padding: 2rem;
            border: 2px dashed #e0e0e0;
            border-radius: 15px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-upload:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            border: 4px solid var(--primary);
            display: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 0.8rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 81, 0, 0.4);
        }

        .btn-reset {
            background: #f5f5f5;
            color: #424242;
            padding: 0.8rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-cancel {
            background: #ffebee;
            color: #c62828;
            padding: 0.8rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-cancel:hover {
            background: #ffcdd2;
            color: #b71c1c;
        }

        .error-message {
            color: #c62828;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .required::after {
            content: " *";
            color: #c62828;
        }

        .breadcrumb-item a {
            color: var(--primary);
            text-decoration: none;
        }

        .breadcrumb-item.active {
            color: #757575;
        }

        .is-invalid {
            border-color: #c62828 !important;
        }
    </style>
</head>
<body>
<div class="registration-container">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/dashboard">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="/admin/students">Students</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Register Student</li>
        </ol>
    </nav>

    <div class="form-card">
        <h4 class="mb-4" style="color: var(--primary-dark);">
            <i class="bi bi-person-plus-fill" style="color: var(--primary);"></i>
            <span th:text="${pageTitle}">Register New Student</span>
        </h4>

        <form th:action="@{/admin/students/register}"
              th:object="${student}"
              method="post"
              enctype="multipart/form-data">

            <!-- Photo Upload -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">Passport Photograph</label>
                    <div class="photo-upload" onclick="document.getElementById('photoFile').click()">
                        <img id="photoPreview" class="photo-preview" src="#" alt="Preview">
                        <i class="bi bi-camera-fill fs-1" style="color: #bdbdbd;" id="photoIcon"></i>
                        <p class="text-muted mb-0" id="photoText">Click to upload passport photo</p>
                        <small class="text-muted">Max size: 5MB (JPG, PNG)</small>
                    </div>
                    <input type="file"
                           id="photoFile"
                           name="photoFile"
                           accept="image/*"
                           style="display: none;"
                           onchange="previewPhoto(event)">
                </div>
            </div>

            <!-- Personal Information -->
            <h5 class="form-section-title">
                <i class="bi bi-person-badge"></i> Personal Information
            </h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Surname</label>
                    <input type="text" class="form-control" th:field="*{surname}"
                           placeholder="Enter surname">
                    <div th:if="${#fields.hasErrors('surname')}"
                         th:errors="*{surname}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">First Name</label>
                    <input type="text" class="form-control" th:field="*{firstName}"
                           placeholder="Enter first name">
                    <div th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Middle Name</label>
                    <input type="text" class="form-control" th:field="*{middleName}"
                           placeholder="Enter middle name (optional)">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Gender</label>
                    <select class="form-select" th:field="*{gender}">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <div th:if="${#fields.hasErrors('gender')}"
                         th:errors="*{gender}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Date of Birth</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}">
                    <div th:if="${#fields.hasErrors('dateOfBirth')}"
                         th:errors="*{dateOfBirth}" class="error-message"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Class</label>
                    <select class="form-select" th:field="*{className}">
                        <option value="">Select Class</option>
                        <option value="Nursery 1">Nursery 1</option>
                        <option value="Nursery 2">Nursery 2</option>
                        <option value="Primary 1">Primary 1</option>
                        <option value="Primary 2">Primary 2</option>
                        <option value="Primary 3">Primary 3</option>
                        <option value="Primary 4">Primary 4</option>
                        <option value="Primary 5">Primary 5</option>
                        <option value="Primary 6">Primary 6</option>
                    </select>
                    <div th:if="${#fields.hasErrors('className')}"
                         th:errors="*{className}" class="error-message"></div>
                </div>
            </div>

            <!-- Parent/Guardian Information -->
            <h5 class="form-section-title">
                <i class="bi bi-people-fill"></i> Parent/Guardian Information
            </h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Parent/Guardian Name</label>
                    <input type="text" class="form-control" th:field="*{parentName}"
                           placeholder="Enter full name of parent/guardian">
                    <div th:if="${#fields.hasErrors('parentName')}"
                         th:errors="*{parentName}" class="error-message"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Phone Number</label>
                    <input type="tel" class="form-control" th:field="*{parentPhone}"
                           placeholder="e.g., +2348000000000">
                    <div th:if="${#fields.hasErrors('parentPhone')}"
                         th:errors="*{parentPhone}" class="error-message"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" th:field="*{parentEmail}"
                           placeholder="parent@example.com">
                    <div th:if="${#fields.hasErrors('parentEmail')}"
                         th:errors="*{parentEmail}" class="error-message"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">Residential Address</label>
                    <input type="text" class="form-control" th:field="*{address}"
                           placeholder="Enter full residential address">
                    <div th:if="${#fields.hasErrors('address')}"
                         th:errors="*{address}" class="error-message"></div>
                </div>
            </div>

            <!-- Additional Information -->
            <h5 class="form-section-title">
                <i class="bi bi-info-circle-fill"></i> Additional Information
            </h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">State of Origin</label>
                    <input type="text" class="form-control" th:field="*{state}"
                           placeholder="e.g., Lagos">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Nationality</label>
                    <input type="text" class="form-control" th:field="*{nationality}"
                           placeholder="e.g., Nigerian">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Religion</label>
                    <select class="form-select" th:field="*{religion}">
                        <option value="">Select Religion</option>
                        <option value="Christianity">Christianity</option>
                        <option value="Islam">Islam</option>
                        <option value="Traditional">Traditional</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Medical Information -->
            <h5 class="form-section-title">
                <i class="bi bi-heart-pulse-fill"></i> Medical Information
            </h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-select" th:field="*{bloodGroup}">
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Medical Condition</label>
                    <input type="text" class="form-control" th:field="*{medicalCondition}"
                           placeholder="Any known medical conditions (e.g., Asthma)">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label required">Emergency Contact</label>
                    <input type="tel" class="form-control" th:field="*{emergencyContact}"
                           placeholder="Emergency phone number">
                    <div th:if="${#fields.hasErrors('emergencyContact')}"
                         th:errors="*{emergencyContact}" class="error-message"></div>
                </div>
            </div>

            <!-- Form Buttons -->
            <div class="d-flex gap-3 mt-4 pt-4 border-top">
                <button type="submit" class="btn btn-submit">
                    <i class="bi bi-check-lg"></i> Register Student
                </button>
                <button type="reset" class="btn btn-reset">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset Form
                </button>
                <a href="/admin/students" class="btn btn-cancel">
                    <i class="bi bi-x-lg"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function previewPhoto(event) {
        const file = event.target.files[0];
        const preview = document.getElementById('photoPreview');
        const icon = document.getElementById('photoIcon');
        const text = document.getElementById('photoText');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                icon.style.display = 'none';
                text.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }
</script>
</body>
</html>
