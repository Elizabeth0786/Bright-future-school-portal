<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bright Future Primary School</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #E65100;
            --primary-dark: #BF360C;
            --warning: #F57C00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 50%, #FFCC80 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 25px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 60px rgba(230, 81, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #E65100, #BF360C);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(230, 81, 0, 0.3);
        }

        .login-logo i {
            font-size: 2.5rem;
            color: #F57C00;
        }

        .login-header h3 {
            font-weight: 700;
            color: #212121;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .login-header p {
            color: #757575;
            font-size: 0.95rem;
        }

        .form-floating {
            margin-bottom: 1.2rem;
        }

        .form-floating input {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 1rem;
            height: calc(3.5rem + 2px);
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-floating input:focus {
            border-color: #E65100;
            box-shadow: 0 0 0 0.2rem rgba(230, 81, 0, 0.15);
            outline: none;
        }

        .form-floating label {
            padding: 1rem;
            color: #757575;
        }

        .btn-login {
            background: linear-gradient(135deg, #E65100, #BF360C);
            color: white;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 81, 0, 0.4);
            color: white;
        }

        .form-check-input:checked {
            background-color: #E65100;
            border-color: #E65100;
        }

        .forgot-password {
            color: #E65100;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        .forgot-password:hover {
            color: #BF360C;
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: #757575;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .back-home a:hover {
            color: #E65100;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .alert-danger {
            background: #FFEBEE;
            border: 1px solid #FFCDD2;
            color: #C62828;
        }

        .alert-success {
            background: #E8F5E9;
            border: 1px solid #C8E6C9;
            color: #2E7D32;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #757575;
            font-size: 0.85rem;
        }

        .login-footer i {
            color: #E65100;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-header h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="bi bi-sun-fill"></i>
            </div>
            <h3>Welcome Back!</h3>
            <p>Sign in to access the student portal</p>
        </div>

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid username or password. Please try again.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            You have been successfully logged out.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-floating mb-3">
                <input type="text"
                       class="form-control"
                       id="username"
                       name="username"
                       placeholder="Enter username"
                       required
                       autocomplete="username">
                <label for="username">
                    <i class="bi bi-person"></i> Username
                </label>
            </div>

            <div class="form-floating mb-3">
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="Enter password"
                       required
                       autocomplete="current-password">
                <label for="password">
                    <i class="bi bi-lock"></i> Password
                </label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                    <label class="form-check-label" for="remember-me" style="font-size: 0.9rem; color: #616161;">
                        Remember me
                    </label>
                </div>
                <a href="#" class="forgot-password">
                    <i class="bi bi-question-circle"></i> Forgot Password?
                </a>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
            </button>
        </form>

        <div class="back-home mt-3">
            <a href="/">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>

    <div class="login-footer">
        <p>
            <i class="bi bi-shield-lock-fill"></i>
            Secure Admin Portal • Default: <strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Auto-hide alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', function() {
        const alerts = document.querySelectorAll('.alert-dismissible');
        alerts.forEach(function(alert) {
            setTimeout(function() {
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            }, 5000);
        });
    });
</script>
</body>
</html>
